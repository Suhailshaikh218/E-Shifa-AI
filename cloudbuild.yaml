# Google Cloud Build Configuration for E-Shifa AI

steps:
  # Build Backend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eshifa-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eshifa-backend:latest'
      - './backend'
    id: 'build-backend'

  # Build Frontend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eshifa-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eshifa-frontend:latest'
      - './frontend'
    id: 'build-frontend'

  # Push Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/eshifa-backend:$COMMIT_SHA'
    id: 'push-backend'
    waitFor: ['build-backend']

  # Push Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/eshifa-frontend:$COMMIT_SHA'
    id: 'push-frontend'
    waitFor: ['build-frontend']

  # Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'eshifa-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/eshifa-backend:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '3'
      - '--max-instances'
      - '500'
      - '--memory'
      - '8Gi'
      - '--cpu'
      - '4'
      - '--timeout'
      - '900'
      - '--set-env-vars'
      - 'DATABASE_URL=$$DATABASE_URL,GEMINI_API_KEY=$$GEMINI_API_KEY,JWT_SECRET_KEY=$$JWT_SECRET_KEY'
    id: 'deploy-backend'
    waitFor: ['push-backend']
    secretEnv: ['DATABASE_URL', 'GEMINI_API_KEY', 'JWT_SECRET_KEY']

  # Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'eshifa-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/eshifa-frontend:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '2'
      - '--max-instances'
      - '100'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '2'
      - '--set-env-vars'
      - 'NEXT_PUBLIC_API_URL=https://eshifa-backend-XXXXX.run.app'
    id: 'deploy-frontend'
    waitFor: ['push-frontend', 'deploy-backend']

# Secrets from Secret Manager
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/database-url/versions/latest
      env: 'DATABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/gemini-api-key/versions/latest
      env: 'GEMINI_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/jwt-secret-key/versions/latest
      env: 'JWT_SECRET_KEY'

# Build timeout
timeout: 1800s

# Images to push to Container Registry
images:
  - 'gcr.io/$PROJECT_ID/eshifa-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/eshifa-backend:latest'
  - 'gcr.io/$PROJECT_ID/eshifa-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/eshifa-frontend:latest'
